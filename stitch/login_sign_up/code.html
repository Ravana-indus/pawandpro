<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Paws &amp; Pro | The Clinical Concierge</title>

                        "outline-variant": "#bdc8ce",
                        "on-primary-container": "#fafdff",
                        "primary-container": "#007f9d",
                        "on-surface-variant": "#3e484d",
                        "surface-tint": "#006780",
                        "on-error-container": "#93000a",
                        "surface": "#f9f9ff",
                        "primary-fixed": "#b7eaff",
                        "tertiary-fixed-dim": "#4edea3",
                        "secondary-fixed-dim": "#c0c6db",

                        "on-primary-fixed-variant": "#004e61",
                        "secondary-fixed": "#dce2f7",

                        "surface-container": "#e7eefe",
                        "secondary-container": "#d9dff5",
                        "secondary": "#575e70",
                        "surface-dim": "#d3daea",

                        "on-tertiary": "#ffffff",

                        "on-error": "#ffffff",
                        "primary-fixed-dim": "#6cd3f7",
                        "primary": "#00647c",
                        "outline": "#6e797e",
                        "on-secondary-fixed-variant": "#404758",
                        "tertiary-container": "#00855b",
                        "on-primary-fixed": "#001f28",
                        "inverse-primary": "#6cd3f7"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Inter"],
                        "label": ["Inter"]

                },
            }

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .clinical-shadow {
            box-shadow: 0 32px 64px -12px rgba(21, 28, 39, 0.08);
        }
        .glass-panel {
            background: rgba(249, 249, 255, 0.8);
            backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface antialiased selection:bg-primary-fixed-dim selection:text-on-primary-fixed">
<main class="min-h-screen flex flex-col md:flex-row">
<!-- Image Canvas Section (The Asymmetric Anchor) -->
<section class="relative w-full md:w-1/2 lg:w-3/5 min-h-[300px] md:min-h-screen overflow-hidden">
<img alt="Luxury Pet Experience" class="absolute inset-0 w-full h-full object-cover" data-alt="High-end editorial photography of a sleek Doberman and a Siamese cat sitting gracefully in a minimalist architectural living space with soft natural morning light." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBuJkkBR8nE2gU1qQwFykIz8zoo0jSG_RjIrO_lTeN3cSyboCJeDbRA8l17Q0hSpzmIwvS114xkFKvj977EGO2GJXg9RFeyFg28MhlhsJjD8V3cXomYHzQPlix-uRSVFvw9TKFGD7XOVp1dgLVlj723DmvFTfhoRRtFnsKSoiVTjCltkrKiaejmSrKO1-nysz_0rZZqFUfyR0BO_2ky3lGeZgaEq41pjslAa1G8BpjcB1UEZoH6sTdzF6z5lEgUKHYH7qs0ncIqOdM"/>
<!-- Branding Overlay -->
<div class="absolute top-8 left-8 md:top-12 md:left-12 z-20">
<div class="flex items-center gap-3">
<div class="w-10 h-10 bg-primary-container rounded-lg flex items-center justify-center text-white">
<span class="material-symbols-outlined" data-icon="pets">pets</span>
</div>
<span class="font-headline font-extrabold text-2xl tracking-tighter text-on-background bg-white/90 px-4 py-1 rounded-full backdrop-blur-sm">Paws &amp; Pro</span>
</div>
</div>
<!-- Editorial Quote -->
<div class="absolute bottom-12 left-12 right-12 z-20 hidden lg:block">
<div class="glass-panel p-10 rounded-lg max-w-xl">
<span class="font-headline text-xs font-bold uppercase tracking-[0.2em] text-primary mb-4 block">Medical Grade Excellence</span>
<h1 class="font-headline text-4xl font-extrabold text-on-surface leading-tight tracking-tight">
                        Your pet's health, <br/>orchestrated with precision.
                    </h1>
</div>
</div>
<!-- Tonal Gradient Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-background/40 to-transparent pointer-events-none"></div>
</section>
<!-- Functional Canvas Section (The Form) -->
<section class="w-full md:w-1/2 lg:w-2/5 bg-surface flex flex-col justify-center px-6 py-12 md:px-16 lg:px-24">
<div class="max-w-md w-full mx-auto">
<!-- Header & Toggle -->
<div class="mb-12">
<div class="flex justify-between items-end mb-8">
<div>
<h2 class="font-headline text-3xl font-extrabold tracking-tight text-on-surface">Welcome back</h2>
<p class="text-on-surface-variant font-medium mt-2">Enter your credentials to manage your clinic.</p>
</div>
</div>
<!-- Asymmetric Tab Toggle -->
<div class="inline-flex p-1 bg-surface-container rounded-full">
<button class="px-8 py-2.5 rounded-full bg-surface-container-lowest text-primary font-bold shadow-sm text-sm transition-all">
                            Sign In
                        </button>
<button class="px-8 py-2.5 rounded-full text-on-surface-variant hover:text-on-surface font-medium text-sm transition-all">
                            Create Account
                        </button>
</div>
</div>
<!-- Auth Form -->
<form class="space-y-6" onsubmit="return false;">
<div class="space-y-4">
<!-- Clinical Input Field -->
<div class="group">
<label class="block font-headline text-[10px] font-bold uppercase tracking-widest text-on-surface-variant mb-2 px-1">Professional Email</label>
<div class="relative">
<input class="w-full bg-surface-container border-none focus:ring-2 focus:ring-primary rounded-xl py-4 px-5 text-on-surface placeholder:text-outline-variant font-medium transition-all outline-none" placeholder="alex.miller@paws.pro" type="email"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary" data-icon="alternate_email">alternate_email</span>
</div>
</div>
<div class="group">
<div class="flex justify-between items-center mb-2 px-1">
<label class="block font-headline text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Security Key</label>
<a class="text-[10px] font-bold uppercase tracking-widest text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative">
<input class="w-full bg-surface-container border-none focus:ring-2 focus:ring-primary rounded-xl py-4 px-5 text-on-surface placeholder:text-outline-variant font-medium transition-all outline-none" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary" data-icon="lock_open">lock_open</span>
</div>
</div>
</div>
<!-- Stay logged in -->
<label class="flex items-center gap-3 cursor-pointer group">
<input class="w-5 h-5 rounded-md border-outline-variant text-primary focus:ring-primary/20 bg-surface-container-low transition-all" type="checkbox"/>
<span class="text-sm font-medium text-on-surface-variant group-hover:text-on-surface transition-colors">Remember this workstation</span>
</label>
<!-- Primary Action -->
<button class="w-full py-5 rounded-xl bg-gradient-to-r from-[#00647C] to-[#007F9D] text-white font-headline font-bold text-lg clinical-shadow hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        Sign In to Dashboard
                        <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
<!-- Divider -->
<div class="relative my-12 flex items-center">
<div class="flex-grow border-t border-outline-variant/20"></div>
<span class="flex-shrink mx-4 text-[10px] font-bold uppercase tracking-[0.3em] text-outline">Social Gateway</span>
<div class="flex-grow border-t border-outline-variant/20"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-3 py-4 rounded-xl bg-surface-container-low hover:bg-surface-container transition-colors group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="currentColor"></path>
</svg>
<span class="text-sm font-bold tracking-tight text-on-surface">Google</span>
</button>
<button class="flex items-center justify-center gap-3 py-4 rounded-xl bg-surface-container-low hover:bg-surface-container transition-colors group">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M17.05 20.28c-.98.95-2.05 1.71-3.21 2.27-1.16.56-2.38.84-3.66.84-1.28 0-2.5-.28-3.66-.84-1.16-.56-2.23-1.32-3.21-2.27-2.12-2.05-3.18-4.74-3.18-8.07 0-3.33 1.06-6.02 3.18-8.07.98-.95 2.05-1.71 3.21-2.27C7.68 1.3 8.9 1.02 10.18 1.02c1.28 0 2.5.28 3.66.84 1.16.56 2.23 1.32 3.21 2.27 2.12 2.05 3.18 4.74 3.18 8.07 0 3.33-1.06 6.02-3.18 8.08z" fill="currentColor"></path>
</svg>
<span class="text-sm font-bold tracking-tight text-on-surface">Apple</span>
</button>
</div>
<!-- Footer Text -->
<footer class="mt-16 text-center">
<p class="text-xs text-on-surface-variant font-medium leading-relaxed">
                        By logging in, you agree to Paws &amp; Pro’s <br/>
<a class="text-primary hover:underline underline-offset-4" href="#">Terms of Service</a> and <a class="text-primary hover:underline underline-offset-4" href="#">Clinical Privacy Protocols</a>.
                    </p>
</footer>
</div>
</section>
</main>
<!-- Support Floating Action (Minimal Context) -->
<div class="fixed bottom-8 right-8 z-50">
<button class="w-14 h-14 bg-surface-container-lowest clinical-shadow rounded-full flex items-center justify-center text-primary hover:scale-110 active:scale-95 transition-all">
<span class="material-symbols-outlined" data-icon="support_agent">support_agent</span>
</button>
</div>
</body></html>
